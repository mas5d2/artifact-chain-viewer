<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Technology Artifact Graph v2</title>
<style>
:root{color-scheme:light dark;--bg:#f4f6f8;--panel:#fff;--text:#17202a;--muted:#65717d;--border:#d8dee5}
@media(prefers-color-scheme:dark){:root{--bg:#0f1419;--panel:#171d23;--text:#ecf0f3;--muted:#9aa7b3;--border:#303a44}}
*{box-sizing:border-box}body{margin:0;font:14px/1.45 Inter,system-ui,sans-serif;background:var(--bg);color:var(--text)}
header{display:flex;align-items:center;gap:14px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--panel)}
h1{font-size:18px;margin:0;white-space:nowrap}.controls{display:flex;flex-wrap:wrap;gap:8px;width:100%;align-items:center}
input,select,button{font:inherit;color:inherit;background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:7px 9px}input[type=search]{min-width:220px;flex:1}button{cursor:pointer}
.controls label{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;border:1px solid var(--border);border-radius:7px;padding:7px 9px;cursor:pointer;background:var(--panel)}
.controls input[type=checkbox]{min-width:0;flex:none;width:auto;margin:0;padding:0;border:0;accent-color:#4f46e5}
main{display:grid;grid-template-columns:minmax(0,1fr) 370px;height:calc(100vh - 58px)}#cy{height:100%;background:var(--bg)}aside{overflow:auto;padding:16px;border-left:1px solid var(--border);background:var(--panel)}
aside h2{margin:0 0 4px;font-size:18px}aside h3{margin:18px 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}.meta,.empty,.note{color:var(--muted)}
.pills{display:flex;flex-wrap:wrap;gap:6px}.pill{border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:12px}ul{padding-left:18px}.legend{display:grid;grid-template-columns:auto 1fr;gap:6px 8px;margin-top:14px;color:var(--muted)}.swatch{width:12px;height:12px;border-radius:3px;margin-top:4px}.note{font-size:12px;margin-top:18px}
@media(max-width:900px){header{align-items:flex-start;flex-direction:column}main{grid-template-columns:1fr;grid-template-rows:60vh auto;height:auto}#cy{height:60vh}aside{border-left:0;border-top:1px solid var(--border)}}
.tabs{display:flex;gap:6px;margin-bottom:12px}.tab{opacity:.55}.tab.active{opacity:1;border-color:#4f46e5}
.badge{border-radius:999px;padding:2px 8px;font-size:11px;color:#fff;text-transform:capitalize}
.b-safe{background:#2e7d32}.b-conditional{background:#d97706}.b-unsafe{background:#c23b53}.b-done{background:#7b8794}.b-gather{background:#315efb}
.statusrow,.nba,.featrow{display:flex;align-items:center;gap:8px;margin:7px 0;flex-wrap:wrap}
.rolename{font-weight:600;min-width:78px}.nba button,#project button[data-node]{text-align:left}#project input{min-width:0;flex:1}
.doclink{display:inline-block;border:1px solid #ffd166;border-radius:7px;padding:6px 10px;text-decoration:none;font-weight:600;font-size:13px}.doclink:hover{background:rgba(255,209,102,.15)}
</style></head>
<body><header><h1>Technology Artifact Graph v2</h1><div class="controls">
<input id="search" type="search" placeholder="Search artifacts, authors, sources…">
<select id="stage"><option value="">All stages</option><option value="upstream-definition">Upstream Definition</option><option value="project-start">Project Start</option><option value="feature-level">Feature Level</option><option value="release">Release</option><option value="external">External Inputs</option></select>
<select id="author"><option value="">All authors</option></select>
<select id="consumer"><option value="">All consumers</option></select>
<select id="requirement"><option value="">All requirement levels</option><option value="required">Required</option><option value="conditional">Conditional</option><option value="not-applicable">Not applicable</option></select>
<select id="layout"><option value="layered">Layered by depth</option><option value="breadthfirst">Clustered</option></select>
<label><input id="showExternal" type="checkbox" checked> Show external inputs</label><label title="Hide dependency edges already implied by a longer path — the artifact is still a real input (see its detail panel)"><input id="hideImplied" type="checkbox" checked> Hide implied edges</label><button id="fit">Fit</button><button id="clear">Clear focus</button><a class="doclink" href="docs/index.html" target="_blank" rel="noreferrer">Docs ↗</a></div></header>
<main><div id="cy"></div><aside><div class="tabs"><button id="tabExplore" class="tab active">Explore</button><button id="tabProject" class="tab">Project</button></div>
<div id="details"><h2>Explore the chain</h2><p class="empty">Select an artifact to see what it depends on and what it enables.</p>
<div class="legend"><span class="swatch" style="background:#4f46e5"></span><span>Upstream Definition</span><span class="swatch" style="background:#1f77b4"></span><span>Project Start</span><span class="swatch" style="background:#d97706"></span><span>Feature Level</span><span class="swatch" style="background:#c23b53"></span><span>Release</span><span class="swatch" style="background:#7b8794"></span><span>External Input</span><span class="swatch" style="background:transparent;border:2px solid #ffd166"></span><span>★ Keystone — the whole project flows through it</span></div><p class="note">Edges point from prerequisite to dependent.</p></div>
<div id="project" style="display:none"></div></aside></main>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script><script src="app.js"></script></body></html>
